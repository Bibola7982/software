<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Genius Lab Billing</title>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#eee}

/* LOGIN */
#loginBox{
 position:fixed;inset:0;
 display:flex;justify-content:center;align-items:center;
 background:linear-gradient(135deg,#4facfe,#00f2fe);
}
.login-card{
 background:#fff;padding:25px;border-radius:12px;
 width:90%;max-width:350px;text-align:center;
 box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
.input-group input{
 width:100%;padding:10px;margin-bottom:12px;
 border-radius:8px;border:1px solid #ccc;
}
.btn-group{display:flex;gap:10px}
.btn{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer}
.login-btn{background:#4facfe;color:#fff}
.register-btn{background:#ddd}

/* DASHBOARD */
#dashboard{
 display:none;text-align:center;
 margin:10px;font-weight:bold;
}

/* BILL */
.container{
 max-width:780px;margin:20px auto;background:#fff;
 padding:15px;border-radius:8px;
 box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.row{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.field{flex:1;display:flex;gap:5px;align-items:center}
.field input{width:100%;padding:5px}

.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}

table{width:100%;border-collapse:collapse}
table,th,td{border:1px solid #000}
th,td{padding:8px;text-align:center}

.total{text-align:right;font-weight:bold;margin-top:10px}
.signature{margin-top:60px;display:flex;justify-content:space-between}

/* PRINT */
@media print{
 .no-print{display:none}
 @page{margin:3cm 1cm}
 input{border:none}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
 <div class="login-card">
  <h2>🧪 Genius Lab</h2>
  <div class="input-group"><input id="email" placeholder="Email"></div>
  <div class="input-group"><input id="password" type="password" placeholder="Password"></div>
  <div class="btn-group">
   <button class="btn register-btn" onclick="register()">Register</button>
   <button class="btn login-btn" onclick="login()">Login</button>
  </div>
 </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="no-print">
📊 Bills: <span id="totalBills">0</span> | ₹ <span id="totalAmount">0</span>
</div>

<!-- BILL -->
<div class="container" id="bill" style="display:none">

<h1>Lab Test Bill</h1>

<div class="row">
<div class="field">Bill No:<input id="billNo"></div>
<div class="field">Date:<input type="date" id="date"></div>
<div class="field">Name:<input id="name"></div>
<div class="field">Age:<input id="age"></div>
</div>

<div class="row">
<div class="field">Gender:<input id="gender"></div>
<div class="field">Mobile:<input id="mobile"></div>
<div class="field">Doctor:<input id="doctor"></div>
<div class="field">Address:<input id="address"></div>
</div>

<div class="controls no-print">
<select id="testSelect"></select>
<input id="amount" type="number" placeholder="Amount">
<button onclick="addTest()">Add</button>

<input id="newTest" placeholder="New Test">
<input id="newPrice" type="number" placeholder="Price">
<button onclick="addNewTest()">Add Test</button>
</div>

<table>
<thead><tr><th>Test</th><th>Amount</th><th class="no-print">X</th></tr></thead>
<tbody id="tbody"></tbody>
</table>

<div class="total">Total ₹ <span id="total">0</span></div>

<div class="signature">
<div>Patient Sign</div>
<div>Authorized Sign</div>
</div>

<div class="no-print">
<button onclick="saveBill()">Save Cloud</button>
<button onclick="window.print()">Print</button>
<button onclick="logout()">Logout</button>
</div>

</div>

<script>

// FIREBASE
firebase.initializeApp({
 apiKey:"AIzaSyB3u3SpBpEzFMCb4dLhhA3sFWUBaZoVDfY",
 authDomain:"lab-billing-593ea.firebaseapp.com",
 projectId:"lab-billing-593ea",
 storageBucket:"lab-billing-593ea.appspot.com"
});

var db=firebase.firestore();
var storage=firebase.storage();

// AUTH
function register(){
 firebase.auth().createUserWithEmailAndPassword(email.value,password.value)
 .then(()=>alert("Registered")).catch(e=>alert(e.message));
}
function login(){
 firebase.auth().signInWithEmailAndPassword(email.value,password.value)
 .catch(e=>alert(e.message));
}
function logout(){firebase.auth().signOut();}

firebase.auth().onAuthStateChanged(user=>{
 if(user){
  loginBox.style.display="none";
  bill.style.display="block";
  dashboard.style.display="block";
  loadDashboard();
 }else{
  loginBox.style.display="flex";
  bill.style.display="none";
 }
});

// BILL NO
billNo.value=(+localStorage.billNo+1||1);
localStorage.billNo=billNo.value;
date.valueAsDate=new Date();

// TESTS
let tests={"CBC":200,"LFT":600,"RFT":800};

function loadTests(){
 testSelect.innerHTML="<option>Select</option>";
 for(let t in tests){
  testSelect.innerHTML+=`<option>${t}</option>`;
 }
}
loadTests();

testSelect.onchange=()=>amount.value=tests[testSelect.value]||"";

// ADD TEST
function addTest(){
 if(!testSelect.value||!amount.value)return;
 tbody.innerHTML+=`<tr>
 <td>${testSelect.value}</td>
 <td contenteditable>${amount.value}</td>
 <td class="no-print"><button onclick="this.parentElement.parentElement.remove();calc()">X</button></td>
 </tr>`;
 calc();
}

// ADD NEW TEST
function addNewTest(){
 let t=newTest.value.trim();
 let p=newPrice.value;
 if(!t||!p)return alert("Enter test & price");
 tests[t]=+p;
 loadTests();
 newTest.value="";newPrice.value="";
}

// TOTAL
function calc(){
 let t=0;
 document.querySelectorAll("#tbody tr").forEach(r=>t+=+r.cells[1].innerText||0);
 total.innerText=t;
}
document.addEventListener("input",calc);

// SAVE
async function saveBill(){
 let user=firebase.auth().currentUser;
 if(!user)return alert("Login first");

 let blob=await html2pdf().from(bill).outputPdf('blob');
 let ref=storage.ref(user.uid+"/"+billNo.value+".pdf");
 await ref.put(blob);

 let url=await ref.getDownloadURL();

 await db.collection("bills").add({
 uid:user.uid,total:total.innerText,date:new Date()
 });

 alert("Saved");
 loadDashboard();
}

// DASHBOARD
async function loadDashboard(){
 let snap=await db.collection("bills").get();
 let c=0,a=0;
 snap.forEach(d=>{c++;a+=+d.data().total||0});
 totalBills.innerText=c;
 totalAmount.innerText=a;
}

</script>

</body>
</html>
