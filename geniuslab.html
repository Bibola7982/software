<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Genius Lab Billing</title>

<!-- html2pdf -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<style>
*{box-sizing:border-box}
body{font-family:Arial;background:#eee;margin:0}
.container{max-width:780px;margin:auto;background:#fff;padding:15px;position:relative}
h1{text-align:center}
.top-box{border:1px solid #000;padding:10px;margin-bottom:15px}
.row{display:flex;gap:10px;margin-bottom:8px}
.field{flex:1;display:flex;gap:5px;align-items:center}
.field label{min-width:70px;font-weight:bold}
.field input{width:100%;padding:5px}
.controls{display:flex;gap:8px;margin-bottom:10px}
table{width:100%;border-collapse:collapse}
table,th,td{border:1px solid black}
th,td{padding:8px;text-align:center}
.total{font-size:18px;margin-top:10px}
.signature{margin-top:60px;display:flex;justify-content:space-between}
.watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;color:rgba(0,0,0,0.08)}
#loginBox{text-align:center;margin-top:50px}
@media print{.no-print{display:none}@page{margin:3cm 1cm}input{border:none}}

  /* FONT */

/* BODY RESET */
{
    margin:0;
}

/* LOGIN FULL CENTER */
#loginBox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background: linear-gradient(135deg, #4facfe, #00f2fe);
    z-index:9999;
}

/* CARD */
.login-card{
    background:white;
    padding:30px 25px;
    border-radius:12px;
    width:90%;
    max-width:350px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* INPUT */
.input-group input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-bottom:12px;
}

/* BUTTON */
.btn-group{
    display:flex;
    gap:10px;
}

.btn{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.login-btn{
    background:#4facfe;
    color:white;
}

.register-btn{
    background:#ddd;
}
  
  
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="login-container">
    <div class="login-card">
        <h2>🧪 Genius Lab Reports</h2>
        <p class="subtitle">Secure Login Portal</p>

        <div class="input-group">
            <input id="email" type="email" placeholder="Email">
        </div>

        <div class="input-group">
            <input id="password" type="password" placeholder="Password">
        </div>

        <div class="btn-group">
            <button class="btn register-btn" onclick="register()">Register</button>
            <button class="btn login-btn" onclick="login()">Login</button>
        </div>
    </div>
</div>


<!-- BILL -->
<div class="container" id="bill" style="display:none">


<h1>Lab Test Bill</h1>

<div class="top-box">
<div class="row">
<div class="field"><label>Bill No:</label><input id="billNo"></div>
<div class="field"><label>Date:</label><input type="date" id="date"></div>
<div class="field"><label>Name:</label><input id="name"></div>
<div class="field"><label>Age:</label><input id="age"></div>
</div>

<div class="row">
<div class="field"><label>Gender:</label><input id="gender"></div>
<div class="field"><label>Mobile:</label><input id="mobile"></div>
<div class="field"><label>Doctor:</label><input id="doctor"></div>
<div class="field"><label>Address:</label><input id="address"></div>
</div>
</div>

<div class="controls no-print">
<select id="testSelect"></select>
<input id="amount" type="number" placeholder="Amount">
<button onclick="addTest()">Add</button>

<input id="newTest" placeholder="New Test">
<input id="newPrice" type="number" placeholder="Price">
<button onclick="addNewTest()">Add Test</button>
</div>

<table>
<thead><tr><th>Test</th><th>Amount</th><th class="no-print">X</th></tr></thead>
<tbody id="tbody"></tbody>
</table>

<div class="total">Total: ₹ <span id="total">0</span></div>




<div class="signature">
<div>Patient Sign</div>
<div>Authorized Sign</div>
</div>

<div class="no-print">
<button onclick="saveBill()">Save Cloud</button>
<button onclick="loadBills()">Open PDF</button>
<button onclick="window.print()">Print</button>
<button onclick="logout()">Logout</button>
</div>



</div>

<script>

// 🔥 YOUR FIREBASE CONFIG (FIXED)
var firebaseConfig = {
  apiKey: "AIzaSyB3u3SpBpEzFMCb4dLhhA3sFWUBaZoVDfY",
  authDomain: "lab-billing-593ea.firebaseapp.com",
  projectId: "lab-billing-593ea",
  storageBucket: "lab-billing-593ea.appspot.com",
  messagingSenderId: "1019452993424",
  appId: "1:1019452993424:web:82b8317a314aa4be054d15"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var storage = firebase.storage();

// AUTH
function register(){
 firebase.auth().createUserWithEmailAndPassword(email.value,password.value)
 .then(()=>alert("Registered"))
 .catch(e=>alert(e.message));
}

function login(){
 firebase.auth().signInWithEmailAndPassword(email.value,password.value)
 .catch(e=>alert(e.message));
}

function logout(){ firebase.auth().signOut(); }

firebase.auth().onAuthStateChanged(user=>{
 if(user){
  loginBox.style.display="none";
  bill.style.display="block";
  dashboard.style.display="block";
  loadDashboard();
 } else {
  loginBox.style.display="block";
  bill.style.display="none";
 }
});



// BILL NO
function generateBillNo(){
 let last=localStorage.getItem("billNo")||0;
 last++;
 localStorage.setItem("billNo",last);
 return last.toString().padStart(2,'0');
}
billNo.value=generateBillNo();
date.valueAsDate=new Date();

// TESTS
let tests={"CBC":200,"LFT":600,"RFT":800,"RBS":50};
function loadTests(){
 testSelect.innerHTML="<option>Select</option>";
 for(let t in tests){
  testSelect.innerHTML+=`<option>${t}</option>`;
 }
}
loadTests();

testSelect.onchange=()=>amount.value=tests[testSelect.value]||"";

// ADD TEST
function addTest(){
 if(!testSelect.value||!amount.value)return;
 tbody.innerHTML+=`
 <tr>
 <td>${testSelect.value}</td>
 <td contenteditable="true">${amount.value}</td>
 <td class="no-print"><button onclick="this.parentElement.parentElement.remove();calc()">X</button></td>
 </tr>`;
 calc();
}

// ADD CUSTOM
function addNewTest(){
 if(!newTest.value||!newPrice.value)return;
 tests[newTest.value]=parseInt(newPrice.value);
 loadTests();
}

// TOTAL
function calc(){
 let t=0;
 document.querySelectorAll("#tbody tr").forEach(r=>{
  t+=Number(r.cells[1].innerText)||0;
 });
 total.innerText=t;
}
document.addEventListener("input",calc);




// SAVE PDF CLOUD
async function saveBill(){

 let user=firebase.auth().currentUser;
 if(!user)return alert("Login first");

 let filename=(name.value||"bill")+"_"+billNo.value+".pdf";

 let blob=await html2pdf().from(bill).outputPdf('blob');

 let ref=storage.ref().child(user.uid+"/"+filename);
 await ref.put(blob);

 let url=await ref.getDownloadURL();

 await db.collection("bills").add({
  uid:user.uid,
  name:name.value,
  billNo:billNo.value,
  total:total.innerText,
  url:url,
  date:new Date()
 });

 alert("Saved to Cloud ✅");
 loadDashboard();
}

// LOAD PDF
async function loadBills(){
 let user=firebase.auth().currentUser;

 let snap=await db.collection("bills").where("uid","==",user.uid).get();

 let arr=[],list="Your Bills:\n";

 snap.forEach((doc,i)=>{
  let d=doc.data();
  arr.push(d);
  list+=`${i+1}. ${d.billNo} - ${d.name}\n`;
 });

 let i=prompt(list+"\nEnter:");
 if(!i)return;

 window.open(arr[i-1].url);
}

// DASHBOARD
async function loadDashboard(){
 let user=firebase.auth().currentUser;
 let today=new Date().toDateString();

 let snap=await db.collection("bills").where("uid","==",user.uid).get();

 let count=0,totalAmt=0;

 snap.forEach(doc=>{
  let d=doc.data();
  if(new Date(d.date).toDateString()===today){
   count++;
   totalAmt+=Number(d.total||0);
  }
 });

 totalBills.innerText=count;
 totalAmount.innerText=totalAmt;
}

</script>

</body>
</html>
