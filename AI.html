<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>AI Tools App</title> <style> body { margin: 0; font-family: Arial; background: #f4f7fb; transition: 0.3s; } .dark { background: #1e1e1e; color: white; } header { padding: 15px; background: #007bff; color: white; text-align: center; } .search-box { padding: 10px; display: flex; gap: 10px; } input, select { padding: 10px; width: 100%; border-radius: 5px; border: none; } .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 15px; padding: 10px; } .card { background: white; padding: 10px; border-radius: 10px; text-align: center; transition: 0.3s; } .dark .card { background: #2c2c2c; } .card img { width: 40px; height: 40px; } .card h4 { margin: 5px 0; } .card p { font-size: 12px; } .btn { display: inline-block; padding: 6px 10px; background: #007bff; color: white; border-radius: 5px; text-decoration: none; font-size: 12px; } .toggle { position: fixed; top: 10px; right: 10px; background: black; color: white; padding: 8px; cursor: pointer; border-radius: 5px; } </style> </head> <body> <header> <h2>AI Tools Directory 📱</h2> </header> <div class="toggle" onclick="toggleDark()">🌙</div> <div class="search-box"> <input type="text" id="search" placeholder="Search AI tool..."> <select id="filter"> <option value="all">All</option> <option value="research">Research</option> <option value="writing">Writing</option> <option value="image">Image</option> <option value="video">Video</option> <option value="code">Code</option> <option value="seo">SEO</option> </select> </div> <div class="container" id="container"></div> <script> const tools = [ /* RESEARCH */ { name:"ChatGPT", cat:"research", desc:"AI chatbot", link:"https://chat.openai.com", logo:"https://cdn-icons-png.flaticon.com/512/4712/4712027.png"}, { name:"Claude", cat:"research", desc:"AI assistant", link:"https://claude.ai", logo:"https://cdn-icons-png.flaticon.com/512/4712/4712109.png"}, { name:"Perplexity", cat:"research", desc:"AI search engine", link:"https://www.perplexity.ai", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968866.png"}, /* WRITING */ { name:"Quillbot", cat:"writing", desc:"Paraphrasing tool", link:"https://quillbot.com", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968705.png"}, { name:"Rytr", cat:"writing", desc:"AI writer", link:"https://rytr.me", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968898.png"}, { name:"Notion AI", cat:"writing", desc:"AI workspace", link:"https://notion.so", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968875.png"}, /* IMAGE */ { name:"Midjourney", cat:"image", desc:"AI image generator", link:"https://midjourney.com", logo:"https://cdn-icons-png.flaticon.com/512/1828/1828884.png"}, { name:"DALL-E", cat:"image", desc:"Image generator", link:"https://openai.com/dall-e", logo:"https://cdn-icons-png.flaticon.com/512/4712/4712035.png"}, { name:"Leonardo AI", cat:"image", desc:"Art generator", link:"https://leonardo.ai", logo:"https://cdn-icons-png.flaticon.com/512/1828/1828884.png"}, /* VIDEO */ { name:"Runway ML", cat:"video", desc:"Video AI tool", link:"https://runwayml.com", logo:"https://cdn-icons-png.flaticon.com/512/1384/1384060.png"}, { name:"Pictory", cat:"video", desc:"Text to video", link:"https://pictory.ai", logo:"https://cdn-icons-png.flaticon.com/512/1384/1384060.png"}, { name:"InVideo", cat:"video", desc:"Video editor", link:"https://invideo.io", logo:"https://cdn-icons-png.flaticon.com/512/1384/1384060.png"}, /* CODE */ { name:"GitHub Copilot", cat:"code", desc:"AI coding assistant", link:"https://github.com/copilot", logo:"https://cdn-icons-png.flaticon.com/512/733/733553.png"}, { name:"Replit", cat:"code", desc:"Online coding", link:"https://replit.com", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968705.png"}, { name:"Codeium", cat:"code", desc:"AI code tool", link:"https://codeium.com", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968705.png"}, /* SEO */ { name:"Semrush", cat:"seo", desc:"SEO tool", link:"https://semrush.com", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968875.png"}, { name:"Surfer SEO", cat:"seo", desc:"Content SEO", link:"https://surferseo.com", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968875.png"}, { name:"Alli AI", cat:"seo", desc:"SEO automation", link:"https://alli.ai", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968875.png"} ]; const container = document.getElementById("container"); function displayTools(list){ container.innerHTML = ""; list.forEach(tool => { container.innerHTML += <div class="card" data-cat="${tool.cat}"> <img src="${tool.logo}"> <h4>${tool.name}</h4> <p>${tool.desc}</p> <a href="${tool.link}" target="_blank" class="btn">Open</a> </div>; }); } displayTools(tools); /* SEARCH */ document.getElementById("search").addEventListener("input", function(){ let value = this.value.toLowerCase(); let filtered = tools.filter(t => t.name.toLowerCase().includes(value)); displayTools(filtered); }); /* FILTER */ document.getElementById("filter").addEventListener("change", function(){ let cat = this.value; if(cat === "all") displayTools(tools); else displayTools(tools.filter(t => t.cat === cat)); }); /* DARK MODE */ function toggleDark(){ document.body.classList.toggle("dark"); } </script> </body> </html>
