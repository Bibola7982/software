<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f7fb;
    transition: 0.3s;
}

/* DARK MODE */
.dark {
    background: #121212;
    color: white;
}

/* HEADER */
header {
    padding: 15px;
    background: linear-gradient(45deg,#007bff,#00c6ff);
    color: white;
    text-align: center;
    font-size: 18px;
}

/* SEARCH */
.search-box {
    padding: 10px;
    display: flex;
    gap: 10px;
}

input, select {
    padding: 10px;
    width: 100%;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* CATEGORY BUTTONS */
.categories {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
}

.categories button {
    padding: 8px 12px;
    border: none;
    border-radius: 20px;
    background: #ddd;
    cursor: pointer;
}

.categories button.active {
    background: #007bff;
    color: white;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 12px;
    padding: 10px;
}

/* CARD */
.card {
    background: white;
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    transition: 0.3s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.card:hover {
    transform: translateY(-5px);
}

.dark .card {
    background: #1f1f1f;
}

.card img {
    width: 45px;
    height: 45px;
}

.card h4 {
    margin: 5px 0;
}

.card p {
    font-size: 12px;
}

.btn {
    display: inline-block;
    padding: 6px 10px;
    background: #007bff;
    color: white;
    border-radius: 5px;
    text-decoration: none;
    font-size: 12px;
}

/* DARK BUTTON */
.toggle {
    position: fixed;
    top: 10px;
    right: 10px;
    background: black;
    color: white;
    padding: 8px;
    cursor: pointer;
    border-radius: 5px;
}
</style>

const container = document.getElementById("container");
const catsDiv = document.getElementById("cats");

/* DISPLAY */
function displayTools(list){
    container.innerHTML="";
    list.forEach(t=>{
        container.innerHTML+=`
        <div class="card">
            <img src="${t.logo}">
            <h4>${t.name}</h4>
            <p>${t.desc}</p>
            <a href="${t.link}" target="_blank" class="btn">Open</a>
        </div>`;
    });
}

/* CATEGORIES */
const categories = ["all",...new Set(tools.map(t=>t.cat))];

categories.forEach(cat=>{
    let btn=document.createElement("button");
    btn.innerText=cat;
    btn.onclick=()=>{
        document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        if(cat==="all") displayTools(tools);
        else displayTools(tools.filter(t=>t.cat===cat));
    };
    catsDiv.appendChild(btn);
});

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
    let v=this.value.toLowerCase();
    displayTools(tools.filter(t=>t.name.toLowerCase().includes(v)));
});

/* DARK MODE */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* INIT */
displayTools(tools);
