<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools Hub</title>

<!-- PWA SUPPORT -->
<link rel="manifest" href="manifest.json">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f7fb;
    transition: 0.3s;
}

.dark {
    background: #121212;
    color: white;
}

header {
    padding: 15px;
    background: linear-gradient(45deg,#007bff,#00c6ff);
    color: white;
    text-align: center;
}

/* SEARCH */
.search-box {
    padding: 10px;
}
input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

/* CATEGORY */
.categories {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
}
.categories button {
    padding: 8px 12px;
    border-radius: 20px;
    border: none;
    background: #ddd;
}
.categories button.active {
    background: #007bff;
    color: white;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 12px;
    padding: 10px;
}

/* CARD */
.card {
    background: white;
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    position: relative;
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-5px);
}
.dark .card {
    background: #1f1f1f;
}

.card img {
    width: 45px;
    height: 45px;
    object-fit: contain;
    background: white;
    padding: 5px;
    border-radius: 10px;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 6px 10px;
    background: #007bff;
    color: white;
    border-radius: 5px;
    text-decoration: none;
    font-size: 12px;
}

/* FAVORITE */
.fav {
    border: none;
    background: none;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}
.fav.active {
    transform: scale(1.3);
}

/* TRENDING BADGE */
.badge {
    position: absolute;
    top: 5px;
    left: 5px;
    background: red;
    color: white;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 5px;
}

/* DARK BUTTON */
.toggle {
    position: fixed;
    top: 10px;
    right: 10px;
    background: black;
    color: white;
    padding: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>🚀 Monty Genius AI Tools Hub</header>
<div class="toggle" onclick="toggleDark()">🌙</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search tools...">
</div>

<div class="categories" id="cats"></div>
<div class="container" id="container"></div>

<script>

const tools = [
{ name:"ChatGPT", cat:"research", desc:"AI chatbot", link:"https://chat.openai.com", trending:true },
{ name:"GitHub", cat:"code", desc:"Code hosting", link:"https://github.com", trending:true },
{ name:"Figma", cat:"design", desc:"UI design", link:"https://figma.com" },
{ name:"Notion", cat:"productivity", desc:"Notes", link:"https://notion.so" },
{ name:"Midjourney", cat:"image", desc:"AI art", link:"https://midjourney.com", trending:true },
{ name:"Vercel", cat:"code", desc:"Hosting", link:"https://vercel.com" },
{ name:"Netlify", cat:"code", desc:"Deploy", link:"https://netlify.com" },
{ name:"Canva", cat:"design", desc:"Graphics", link:"https://canva.com" },
{ name:"Perplexity", cat:"research", desc:"AI search", link:"https://perplexity.ai" }
];

let favs = JSON.parse(localStorage.getItem("favs")) || [];
let currentCat = "all";

const container = document.getElementById("container");
const catsDiv = document.getElementById("cats");

/* AUTO LOGO */
function getLogo(tool){
    try{
        let domain = new URL(tool.link).hostname.replace("www.","");
        return "https://logo.clearbit.com/" + domain;
    } catch{
        return "https://cdn-icons-png.flaticon.com/512/4712/4712027.png";
    }
}

/* DISPLAY */
function displayTools(list){
    container.innerHTML="";
    list.forEach(t=>{
        let favClass = favs.includes(t.name) ? "active" : "";
        container.innerHTML+=`
        <div class="card">
            ${t.trending ? '<div class="badge">🔥 Top</div>' : ''}
            <img src="${getLogo(t)}">
            <h4>${t.name}</h4>
            <p>${t.desc}</p>
            <button class="fav ${favClass}" onclick="toggleFav('${t.name}',this)">❤️</button><br>
            <a href="${t.link}" target="_blank" class="btn">Open</a>
        </div>`;
    });
}

/* FAVORITE */
function toggleFav(name,btn){
    if(favs.includes(name)){
        favs = favs.filter(f=>f!==name);
        btn.classList.remove("active");
    } else {
        favs.push(name);
        btn.classList.add("active");
    }
    localStorage.setItem("favs", JSON.stringify(favs));
}

/* FILTER */
function filterAll(){
    let v=document.getElementById("search").value.toLowerCase();
    let filtered = tools.filter(t=>{
        let matchName = t.name.toLowerCase().includes(v);
        let matchCat = currentCat==="all" || t.cat===currentCat || (currentCat==="favorites" && favs.includes(t.name));
        return matchName && matchCat;
    });
    displayTools(filtered);
}

document.getElementById("search").addEventListener("input",filterAll);

/* CATEGORY */
const categories = ["favorites","all",...new Set(tools.map(t=>t.cat))];

categories.forEach(cat=>{
    let btn=document.createElement("button");
    btn.innerText=cat;
    btn.onclick=()=>{
        currentCat=cat;
        document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        filterAll();
    };
    catsDiv.appendChild(btn);
});

/* DARK MODE */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* INIT */
displayTools(tools);

/* SERVICE WORKER (APK FEEL) */
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
