<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools Hub</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f7fb;
    transition: 0.3s;
}

.dark {
    background: #121212;
    color: white;
}

header {
    padding: 15px;
    background: linear-gradient(45deg,#007bff,#00c6ff);
    color: white;
    text-align: center;
}

.search-box {
    padding: 10px;
}

input {
    padding: 10px;
    width: 100%;
    border-radius: 8px;
    border: none;
}

.categories {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
}

.categories button {
    padding: 8px 12px;
    border-radius: 20px;
    border: none;
    background: #ddd;
    cursor: pointer;
}

.categories button.active {
    background: #007bff;
    color: white;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 12px;
    padding: 10px;
}

.card {
    background: white;
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.dark .card {
    background: #1f1f1f;
}

.card img {
    width: 45px;
}

.btn {
    display: inline-block;
    padding: 6px 10px;
    background: #007bff;
    color: white;
    border-radius: 5px;
    text-decoration: none;
    font-size: 12px;
}

.fav {
    border: none;
    background: none;
    font-size: 18px;
    cursor: pointer;
}

.toggle {
    position: fixed;
    top: 10px;
    right: 10px;
    background: black;
    color: white;
    padding: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>🚀 Monty Genius AI Tools Hub</header>

<div class="toggle" onclick="toggleDark()">🌙</div>

<div class="search-box">
    <input type="text" id="search" placeholder="Search tools...">
</div>

<div class="categories" id="cats"></div>
<div class="container" id="container"></div>

<script>

const tools = [
{ name:"GitHub", cat:"code", desc:"Code hosting", link:"https://github.com", logo:"https://cdn-icons-png.flaticon.com/512/733/733553.png"},
{ name:"ChatGPT", cat:"research", desc:"AI chatbot", link:"https://chat.openai.com", logo:"https://cdn-icons-png.flaticon.com/512/4712/4712027.png"},
{ name:"Claude", cat:"research", desc:"AI assistant", link:"https://claude.ai", logo:"https://cdn-icons-png.flaticon.com/512/4712/4712109.png"},
{ name:"Perplexity", cat:"research", desc:"AI search", link:"https://perplexity.ai", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968866.png"},
{ name:"Figma", cat:"design", desc:"UI design", link:"https://figma.com", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968705.png"},
{ name:"Canva", cat:"design", desc:"Graphic design", link:"https://canva.com", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968705.png"},
{ name:"Notion", cat:"productivity", desc:"Notes", link:"https://notion.so", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968875.png"},
{ name:"Trello", cat:"productivity", desc:"Task manager", link:"https://trello.com", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968869.png"},
{ name:"Google Drive", cat:"storage", desc:"Cloud storage", link:"https://drive.google.com", logo:"https://cdn-icons-png.flaticon.com/512/2991/2991148.png"},
{ name:"Proton Mail", cat:"productivity", desc:"Secure email", link:"https://mail.proton.me", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968520.png"},
{ name:"VS Code Web", cat:"code", desc:"Online editor", link:"https://vscode.dev", logo:"https://cdn-icons-png.flaticon.com/512/906/906324.png"},
{ name:"Netlify", cat:"code", desc:"Deploy site", link:"https://netlify.com", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968756.png"},
{ name:"Vercel", cat:"code", desc:"Hosting", link:"https://vercel.com", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968705.png"},
{ name:"Firebase", cat:"code", desc:"Backend", link:"https://firebase.google.com", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968528.png"},
{ name:"Supabase", cat:"code", desc:"DB platform", link:"https://supabase.com", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968528.png"},
{ name:"Postman", cat:"code", desc:"API testing", link:"https://postman.com", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968875.png"},
{ name:"Remove.bg", cat:"tools", desc:"Remove background", link:"https://remove.bg", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968705.png"},
{ name:"TinyPNG", cat:"tools", desc:"Compress images", link:"https://tinypng.com", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968705.png"},
{ name:"Speedtest", cat:"tools", desc:"Check speed", link:"https://speedtest.net", logo:"https://cdn-icons-png.flaticon.com/512/483/483947.png"},
{ name:"freeCodeCamp", cat:"learning", desc:"Learn coding", link:"https://freecodecamp.org", logo:"https://cdn-icons-png.flaticon.com/512/5968/5968705.png"}
];

let favs = JSON.parse(localStorage.getItem("favs")) || [];
let currentCat = "all";

const container = document.getElementById("container");
const catsDiv = document.getElementById("cats");

function displayTools(list){
    container.innerHTML="";
    list.forEach(t=>{
        let isFav = favs.includes(t.name) ? "❤️" : "🤍";
        container.innerHTML+=`
        <div class="card">
            <img src="${t.logo}">
            <h4>${t.name}</h4>
            <p>${t.desc}</p>
            <button class="fav" onclick="toggleFav('${t.name}')">${isFav}</button><br>
            <a href="${t.link}" target="_blank" class="btn">Open</a>
        </div>`;
    });
}

function toggleFav(name){
    if(favs.includes(name)){
        favs = favs.filter(f=>f!==name);
    } else {
        favs.push(name);
    }
    localStorage.setItem("favs", JSON.stringify(favs));
    filterAll();
}

function filterAll(){
    let v=document.getElementById("search").value.toLowerCase();

    let filtered = tools.filter(t=>{
        let matchName = t.name.toLowerCase().includes(v);
        let matchCat = currentCat==="all" || t.cat===currentCat || (currentCat==="favorites" && favs.includes(t.name));
        return matchName && matchCat;
    });

    displayTools(filtered);
}

document.getElementById("search").addEventListener("input",filterAll);

const categories = ["favorites","all",...new Set(tools.map(t=>t.cat))];

categories.forEach(cat=>{
    let btn=document.createElement("button");
    btn.innerText=cat;
    btn.onclick=()=>{
        currentCat=cat;
        document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        filterAll();
    };
    catsDiv.appendChild(btn);
});

function toggleDark(){
    document.body.classList.toggle("dark");
}

displayTools(tools);

</script>

</body>
</html>
