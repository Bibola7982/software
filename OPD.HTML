<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OPD Registration</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#eef2ff,#dbeafe);
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
background:#fff;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
overflow:hidden;
}

.header{
background:linear-gradient(135deg,#0f172a,#2563eb);
color:white;
padding:25px;
text-align:center;
}

.header h1{
font-size:32px;
}

.header p{
margin-top:5px;
opacity:.9;
}

.form-area{
padding:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
font-weight:600;
margin-bottom:8px;
color:#1e293b;
}

input,select{
padding:12px;
border:2px solid #dbeafe;
border-radius:10px;
font-size:15px;
transition:.3s;
}

input:focus,
select:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 10px rgba(37,99,235,.2);
}

.buttons{
padding:20px 30px;
display:flex;
gap:15px;
justify-content:center;
}

.btn{
padding:14px 30px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:600;
transition:.3s;
}

.save{
background:#16a34a;
color:white;
}

.print{
background:#2563eb;
color:white;
}

.btn:hover{
transform:translateY(-2px);
}

@media(max-width:768px){

.form-area{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<div class="container">

<div class="header">
<h1><i class="fa-solid fa-hospital"></i> OPD Registration</h1>
<p>Bhale Ram Multi Speciality Hospital</p>
</div>

<div class="form-area">

<div class="form-group">
<label>UHID</label>
<input type="text" id="uhid">
</div>

<div class="form-group">
<label>OPD No</label>
<input type="text" id="opdno">
</div>

<div class="form-group">
<label>OPD SN</label>
<input type="text" id="opdsn">
</div>

<div class="form-group">
<label>Patient Name</label>
<input type="text" id="name">
</div>

<div class="form-group">
<label>Mobile Number</label>
<input type="text" id="mobile">
</div>

<div class="form-group">
<label>Address</label>
<input type="text" id="address">
</div>

<div class="form-group">
<label>Age</label>
<input type="number" id="age">
</div>

<div class="form-group">
<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="form-group">
<label>Date</label>
<input type="date" id="date">
</div>

<div class="form-group">
<label>Valid Upto</label>
<input type="date" id="validupto">
</div>

<div class="form-group">
<label>Time</label>
<input type="time" id="time">
</div>

<div class="form-group">
<label>Doctor Name</label>
<input type="text" id="doctor">
</div>

</div>

<div class="buttons">

<button class="btn save">
<i class="fa-solid fa-floppy-disk"></i>
Save
</button>

<button class="btn print" onclick="window.print()">
<i class="fa-solid fa-print"></i>
Print OPD Slip
</button>

</div>

</div>

<script>

window.onload=function(){

let now=new Date();

document.getElementById('date').value=
now.toISOString().split('T')[0];

let hh=String(now.getHours()).padStart(2,'0');
let mm=String(now.getMinutes()).padStart(2,'0');

document.getElementById('time').value=
hh+":"+mm;

}

</script>

</body>
</html>
