<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>ABG Report Generator</title>

<style>

/*==================================================
        HOSPITAL ABG REPORT
==================================================*/

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#dcdcdc;

font-family:"Courier New",monospace;

}

/*--------------------------------------
Buttons
--------------------------------------*/

.toolbar{

width:210mm;

margin:15px auto;

display:flex;

justify-content:center;

gap:15px;

}

button{

padding:9px 18px;

font-family:inherit;

font-size:20px;

cursor:pointer;

background:white;

border:1px solid black;

}

button:hover{

background:#f2f2f2;

}

/*--------------------------------------
Paper
--------------------------------------*/

.paper{

width:210mm;

height:297mm;

background:white;

margin:auto;

position:relative;

overflow:hidden;

}

/*--------------------------------------
Printable Area
--------------------------------------*/

.report{

position:absolute;

top:50mm;

left:40mm;

right:40mm;

bottom:40mm;

padding:0;

overflow:hidden;

}

/*--------------------------------------
Heading
--------------------------------------*/

.title{

text-align:center;

font-size:20px;

font-weight:bold;

letter-spacing:1px;

margin-bottom:15px;

}

/*--------------------------------------
Patient Details
--------------------------------------*/

.patient{

display:grid;

grid-template-columns:repeat(2,1fr);

column-gap:25px;

row-gap:8px;

margin-bottom:14px;

font-size:18px;

}

.row{

display:flex;

align-items:center;

}

.row label{

width:90px;

font-weight:bold;

}

.edit{

width:100%;

border:none;

outline:none;

background:transparent;

font-family:inherit;

font-size:19px;

}

/*--------------------------------------
Table
--------------------------------------*/

table{

width:100%;

border-collapse:separate;

border-spacing:0 5px;

font-size:19px;

}

th{

text-align:left;

padding-bottom:6px;

}

td{

vertical-align:middle;

}

.parameter{

width:35%;

}

.result{

width:30%;

}

.reference{

width:35%;

}

.value{

width:70px;

border:none;

outline:none;

background:transparent;

font-family:inherit;

font-size:19px;

}

.range{

width:130px;

border:none;

outline:none;

background:transparent;

font-family:inherit;

font-size:19px;

}

.flag{

display:inline-block;

width:18px;

font-weight:bold;

text-align:center;

}

.section{

font-weight:bold;

text-decoration:underline;

padding-top:10px;

padding-bottom:3px;

}

.high{

font-weight:bold;

}

.low{

font-weight:bold;

}

/*--------------------------------------
Print
--------------------------------------*/

@page{

size:A4 portrait;

margin:0;

}

@media print{

body{

background:white;

}

.toolbar{

display:none;

}

.paper{

margin:0;

box-shadow:none;

}

}

</style>

</head>

<script>

const resultInputs=document.querySelectorAll(".result-input");

resultInputs.forEach(function(input){

function check(){

const value=parseFloat(input.value);

const low=parseFloat(input.dataset.low);

const high=parseFloat(input.dataset.high);

const flag=input.nextElementSibling;

flag.textContent="";

input.classList.remove("high","low");

if(isNaN(value)) return;

if(value<low){

flag.textContent="↓";

input.classList.add("low");

}

else if(value>high){

flag.textContent="↑";

input.classList.add("high");

}

}

check();

input.addEventListener("input",check);

});

//--------------------------------------
// Reset Report
//--------------------------------------

function resetReport(){

if(!confirm("Reset the complete report?")) return;

document.querySelectorAll(".edit").forEach(function(el){

if(el.type==="date" || el.type==="time"){

el.value="";

}else{

el.value="";

}

});

document.querySelectorAll(".result-input").forEach(function(el){

const defaults={
"pH":"7.40",
"PCO₂":"40",
"PO₂":"95",
"BE":"0",
"BEecf":"0",
"BB":"48",
"TCO₂":"24",
"HCO₃":"24",
"Std HCO₃":"24",
"Std pH":"7.40",
"Na+":"140",
"K+":"4.0",
"Cl−":"102",
"Ca++":"1.20",
"Creatinine":"0.90",
"Glucose":"95",
"Lactate":"1.2",
"Hb":"15.0",
"HCT":"45",
"SO₂":"98",
"Temperature":"37.0",
"FiO₂":"21"
};

const parameter=el.closest("tr").cells[0].innerText.trim();

if(defaults[parameter]!==undefined){

el.value=defaults[parameter];

}

el.dispatchEvent(new Event("input"));

});

}

//--------------------------------------
// Auto Date
//--------------------------------------

const dateInput=document.querySelector('input[type="date"]');

if(dateInput){

const today=new Date();

dateInput.value=today.toISOString().substring(0,10);

}

//--------------------------------------
// Auto Time
//--------------------------------------

const timeInput=document.querySelector('input[type="time"]');

if(timeInput){

const now=new Date();

const hh=String(now.getHours()).padStart(2,"0");

const mm=String(now.getMinutes()).padStart(2,"0");

timeInput.value=hh+":"+mm;

}

//--------------------------------------
// Select Text on Focus
//--------------------------------------

document.querySelectorAll("input").forEach(function(input){

input.addEventListener("focus",function(){

this.select();

});

});

//--------------------------------------
// Enter Key = Next Field
//--------------------------------------

const allInputs=document.querySelectorAll("input");

allInputs.forEach(function(input,index){

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

e.preventDefault();

const next=allInputs[index+1];

if(next){

next.focus();

}

}

});

});

//--------------------------------------
// Before Printing
//--------------------------------------

window.onbeforeprint=function(){

document.activeElement.blur();

};

//--------------------------------------
// After Printing
//--------------------------------------

window.onafterprint=function(){

};

//--------------------------------------
// Initialize Flag Calculation
//--------------------------------------

document.querySelectorAll(".result-input").forEach(function(input){

input.dispatchEvent(new Event("input"));

});

</script>
